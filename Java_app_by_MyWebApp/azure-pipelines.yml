trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # TODO: replace with your actual Azure App Service name
  webAppName: 'my-webapp-service'
  # TODO: replace with your Azure subscription / service connection name (set up in Project Settings > Service Connections)
  azureSubscription: 'my-azure-service-connection'

steps:
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '11'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    inputs:
      mavenPomFile: 'MyWebApp/pom.xml'
      goals: 'clean package'
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.11'
      mavenVersionOption: 'Default'

  - task: CopyFiles@2
    inputs:
      sourceFolder: 'MyWebApp/target'
      contents: 'MyWebApp-1.0.0.jar'
      targetFolder: '$(Build.ArtifactStagingDirectory)'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'drop'

  - task: AzureWebApp@1
    inputs:
      azureSubscription: '$(azureSubscription)'
      appType: 'webAppLinux'
      appName: '$(webAppName)'
      package: '$(Build.ArtifactStagingDirectory)/MyWebApp-1.0.0.jar'
      runtimeStack: 'JAVA|11-java11'
