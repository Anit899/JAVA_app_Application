name: javapipeline
trigger: none
pool: 
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 01ff8aab-9d5d-4173-94c7-d083c218881f
  webAppName: webappanrg01
  environmentName: testenv

stages:
- stage: builddatage
  displayName: build stage
  jobs:
  - job: mavenPackageAndPublishArtifacts
    displayName: Maven Package And Publish Artifacts
    steps:
    - task: Maven@4
      inputs:
        azureSubscription: 'javaappsvc'
        mavenPomFile: 'Java_app_by_MyWebApp/pom.xml'
        goals: 'package'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        javaHomeOption: 'JDKVersion'
        mavenVersionOption: 'Default'
        mavenAuthenticateFeed: false
        effectivePomSkip: false
        sonarQubeRunAnalysis: false
    - task: CopyFiles@2
      displayName: Copy files to Staging Artifact Directory
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/Java_app_by_MyWebApp'
        Contents: 'target/*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
    - upload: '$(Build.ArtifactStagingDirectory)'
      artifact: drop

- stage: deploystage
  displayName: deploy
  dependsOn: builddatage
  condition: succeeded()
  jobs:
  - deployment: DeoplyLinuxWebApp
    displayName: Deploy linux Web App
    environment: $(environmentName)
    strategy:
     runOnce:
       deploy:
         steps:
         - task: AzureWebApp@1
           inputs:
             azureSubscription: 'javaappsvc'
             appType: 'webAppLinux'
             appName: 'webappanrg01'
             package: '$(System.DefaultWorkingDirectory)/**/*.zip'
